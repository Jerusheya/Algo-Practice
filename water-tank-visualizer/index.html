<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Tank Visualizer</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/animation.css">
</head>
<body>

<div class="container">

    <h1>Water Tank Problem</h1>

    <div class="controls">
        <input
            type="text"
            id="tankInput"
            value="0,4,0,0,0,6,0,6,4,0"
            placeholder="Example: 0,4,0,0,0,6,0,6,4,0"
        />

        <button id="generateBtn">
            Generate
        </button>
    </div>

    <div class="examples">
        Examples:
        <br>
        0,4,0,0,0,6,0,6,4,0
        <br>
        3,0,2,0,4
        <br>
        5,0,1,0,5
    </div>

    <p id="inputDisplay"></p>

    <p id="outputDisplay"></p>

    <table id="grid"><th></th></table>

</div>
<script src="script.js"></script>

</body>
</html>
